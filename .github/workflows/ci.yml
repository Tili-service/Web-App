name: CI

on:
  push:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run npm audit
        run: npm audit --audit-level=high

  build:
    needs: audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build project
        run: npm run build

      - name: Preparre artefact
        run: |
          cp public  ./.next/standalone/Tili/Web-App/public -R
          cp .next/static  ./.next/standalone/Tili/Web-App/.next/static -R

      - name: Deploy artefact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: ./.next/standalone/Tili/Web-App
